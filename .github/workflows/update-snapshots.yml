name: Update Playwright Snapshots

on:
  workflow_dispatch:

jobs:
  update-snapshots:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workout-tracker
    permissions:
      contents: write  # git push
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Update snapshots
        run: bunx playwright test --update-snapshots --grep "visual snapshot"

      - name: Commit and push updated snapshots
        run: |
          cd ..
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add --all -- '*.png'
          git diff --cached --quiet && echo "No snapshot changes" && exit 0
          git commit -m "chore: update Playwright visual snapshots [skip ci]"
          git push
