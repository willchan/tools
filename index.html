<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tools</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3rem 1rem;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 2rem;
    }

    ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      width: 100%;
      max-width: 480px;
    }

    li a {
      display: block;
      padding: 1.25rem 1.5rem;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      color: inherit;
      text-decoration: none;
      font-size: 1.1rem;
      transition: border-color 0.15s;
    }

    li a:hover {
      border-color: #555;
    }

    li a span {
      display: block;
      font-size: 0.85rem;
      color: #777;
      margin-top: 0.25rem;
    }
  </style>
</head>
<body>
  <h1>Tools</h1>
  <ul>
    <li>
      <a href="./workout-tracker/">
        Workout Tracker
        <span>Resistance training log — offline-first PWA</span>
      </a>
    </li>
  </ul>
</body>
</html>
